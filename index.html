<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TXT // VIEWER</title>
<style>
  :root {
    --bg-main: #0d1117;
    --bg-panel: #161b22;
    --bg-hover: #21262d;
    --bg-active: #1f6feb;
    --border: #30363d;
    --text-main: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --error: #f85149;
    --success: #2ea043;
    --font-ui: system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: var(--font-ui);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    background-color: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
  }

  .logo {
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text-main);
    margin-right: 20px;
  }

  .input-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-group label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  input {
    background-color: var(--bg-main);
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
  }

  input:focus { border-color: var(--accent); }

  .btn-main {
    background-color: var(--success);
    color: #fff;
    border: none;
    padding: 7px 14px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .btn-main:hover { background-color: #2c974b; }
  .btn-main:disabled { background-color: var(--bg-hover); color: var(--text-muted); cursor: not-allowed; }

.btn-small {
    background-color: var(--bg-hover);
    color: var(--text-main);
    border: 1px solid var(--border);
    padding: 12px 100px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-small:hover { background-color: var(--border); }
  .btn-small.copied { background-color: var(--success); color: #fff; border-color: var(--success); }

  #status {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-muted);
  }

  #status.error { color: var(--error); }
  #status.success { color: var(--success); }

  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .column {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background-color: var(--bg-panel);
  }

  .col-folders { width: 220px; flex-shrink: 0; }
  .col-files { width: 260px; flex-shrink: 0; background-color: var(--bg-main); }
  .col-content { flex: 1; background-color: var(--bg-main); border-right: none; }

  .column-header {
    padding: 10px 15px;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    letter-spacing: 0.5px;
    background-color: var(--bg-panel);
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 40px;
  }

  .list-container {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .list-item {
    padding: 8px 12px;
    margin-bottom: 4px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-main);
    word-break: break-all;
    transition: background-color 0.1s;
  }

  .list-item:hover { background-color: var(--bg-hover); }
  
  .list-item.active {
    background-color: var(--bg-active);
    color: #fff;
  }

  .text-content-wrapper {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  pre#textContent {
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-main);
    white-space: pre-wrap;
    word-wrap: break-word;
    max-width: 900px;
  }

  .empty-state {
    color: var(--text-muted);
    text-align: center;
    margin-top: 40px;
    font-size: 14px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<header>
  <div class="logo">TXT//VIEWER</div>
  
  <div class="input-group">
    <label>User</label>
    <input type="text" id="ghUser" value="OstinUA" placeholder="Username">
  </div>
  
  <div class="input-group">
    <label>Repo</label>
    <input type="text" id="ghRepo" value="Promt-AI-Helper" placeholder="Repository name">
  </div>
  
  <div class="input-group">
    <label>Branch</label>
    <input type="text" id="ghBranch" value="main" style="width: 80px;">
  </div>

  <button id="loadBtn" class="btn-main" onclick="loadRepository()">Load Files</button>

  <div id="status">Ready</div>
</header>

<div class="workspace">
  <div class="column col-folders">
    <div class="column-header">Folders</div>
    <div class="list-container" id="folderList">
      <div class="empty-state">Loading repository data...</div>
    </div>
  </div>

  <div class="column col-files">
    <div class="column-header">Files</div>
    <div class="list-container" id="fileList">
      <div class="empty-state">Select a folder</div>
    </div>
  </div>

  <div class="column col-content">
    <div class="column-header">
      <span id="contentHeader">File Content</span>
      <button id="copyBtn" class="btn-small" style="display: none;" onclick="copyCode()">Copy</button>
    </div>
    <div class="text-content-wrapper">
      <pre id="textContent"><div class="empty-state">Select a text file to read</div></pre>
    </div>
  </div>
</div>

<script>
let allFiles = [];
let foldersData = {}; 
let currentFolder = null;

const elUser = document.getElementById('ghUser');
const elRepo = document.getElementById('ghRepo');
const elBranch = document.getElementById('ghBranch');

const elStatus = document.getElementById('status');
const elFolderList = document.getElementById('folderList');
const elFileList = document.getElementById('fileList');
const elTextContent = document.getElementById('textContent');
const elContentHeader = document.getElementById('contentHeader');
const btnLoad = document.getElementById('loadBtn');
const btnCopy = document.getElementById('copyBtn');

function setStatus(text, type = 'normal') {
  elStatus.textContent = text;
  elStatus.className = type;
}

function loadSettings() {
  const savedUser = localStorage.getItem('txtViewer_user');
  const savedRepo = localStorage.getItem('txtViewer_repo');
  const savedBranch = localStorage.getItem('txtViewer_branch');

  if (savedUser) elUser.value = savedUser;
  if (savedRepo) elRepo.value = savedRepo;
  if (savedBranch) elBranch.value = savedBranch;
}

function saveSettings() {
  localStorage.setItem('txtViewer_user', elUser.value.trim());
  localStorage.setItem('txtViewer_repo', elRepo.value.trim());
  localStorage.setItem('txtViewer_branch', elBranch.value.trim());
}

async function loadRepository() {
  const user = elUser.value.trim();
  const repo = elRepo.value.trim();
  const branch = elBranch.value.trim() || 'main';

  if (!user || !repo) {
    setStatus('Error: Username and Repository are required.', 'error');
    return;
  }

  saveSettings();

  btnLoad.disabled = true;
  btnCopy.style.display = 'none';
  setStatus('Fetching data...', 'normal');
  
  allFiles = [];
  foldersData = {};
  elFolderList.innerHTML = '';
  elFileList.innerHTML = '<div class="empty-state">Select a folder</div>';
  elTextContent.innerHTML = '<div class="empty-state">Select a text file to read</div>';
  elContentHeader.textContent = 'File Content';

  try {
    const response = await fetch(`https://api.github.com/repos/${user}/${repo}/git/trees/${branch}?recursive=1`);
    
    if (!response.ok) {
      throw new Error(`Repository not found or branch is incorrect (HTTP ${response.status})`);
    }

    const data = await response.json();

    const textFiles = data.tree.filter(f => f.type === 'blob' && /\.(txt|md|csv|json|js|html|css)$/i.test(f.path));

    if (textFiles.length === 0) {
      setStatus('No text files found in this repository.', 'error');
      elFolderList.innerHTML = '<div class="empty-state">No folders</div>';
      btnLoad.disabled = false;
      return;
    }

    textFiles.forEach(f => {
      const parts = f.path.split('/');
      const fileName = parts.pop();
      const folderPath = parts.length > 0 ? parts.join('/') : '/ (Root)';
      const rawUrl = `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${f.path}`;

      if (!foldersData[folderPath]) {
        foldersData[folderPath] = [];
      }
      
      foldersData[folderPath].push({
        path: f.path,
        name: fileName,
        url: rawUrl
      });
    });

    renderFolders();
    setStatus(`Success: Loaded ${textFiles.length} file(s).`, 'success');

  } catch (error) {
    setStatus(error.message, 'error');
  } finally {
    btnLoad.disabled = false;
  }
}

function renderFolders() {
  elFolderList.innerHTML = '';
  const folderNames = Object.keys(foldersData).sort();

  folderNames.forEach(folder => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.textContent = folder;
    
    div.onclick = () => {
      document.querySelectorAll('#folderList .list-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      renderFiles(folder);
    };
    
    elFolderList.appendChild(div);
  });
}

function renderFiles(folderPath) {
  elFileList.innerHTML = '';
  currentFolder = folderPath;
  const files = foldersData[folderPath];

  files.forEach(file => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.textContent = file.name;
    
    div.onclick = () => {
      document.querySelectorAll('#fileList .list-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      loadFileContent(file);
    };
    
    elFileList.appendChild(div);
  });
}

async function loadFileContent(file) {
  elContentHeader.textContent = file.name;
  elTextContent.textContent = 'Loading...';
  btnCopy.style.display = 'none';
  
  try {
    const response = await fetch(file.url);
    if (!response.ok) throw new Error('Failed to fetch file content');
    
    const text = await response.text();
    elTextContent.textContent = text;
    btnCopy.style.display = 'block';
  } catch (error) {
    elTextContent.textContent = `Error loading file: ${error.message}`;
  }
}

function copyCode() {
  const textToCopy = elTextContent.textContent;
  if (!textToCopy) return;

  navigator.clipboard.writeText(textToCopy).then(() => {
    btnCopy.classList.add('copied');
    btnCopy.textContent = 'Copied!';
    
    setTimeout(() => {
      btnCopy.classList.remove('copied');
      btnCopy.textContent = 'Copy';
    }, 2000);
  }).catch(err => {
    console.error('Failed to copy text: ', err);
  });
}

window.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  if (elUser.value && elRepo.value) {
    loadRepository();
  }
});
</script>
</body>
</html>
