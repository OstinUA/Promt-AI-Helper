<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TXT // EDITOR</title>
<style>
  :root {
    --bg-main: #0d1117;
    --bg-panel: #161b22;
    --bg-hover: #21262d;
    --bg-active: #1f6feb;
    --border: #30363d;
    --text-main: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --error: #f85149;
    --success: #2ea043;
    --font-ui: system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: var(--font-ui);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    background-color: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
  }

  .logo {
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text-main);
    margin-right: 20px;
    text-decoration: none;
    transition: color 0.2s;
  }

  .logo:hover {
    color: var(--accent);
  }

  .input-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-group label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  input {
    background-color: var(--bg-main);
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
  }

  input:focus { border-color: var(--accent); }

  .btn-main {
    background-color: var(--success);
    color: #fff;
    border: none;
    padding: 7px 14px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .btn-main:hover { background-color: #2c974b; }
  .btn-main:disabled { background-color: var(--bg-hover); color: var(--text-muted); cursor: not-allowed; }

  .btn-small {
    background-color: var(--bg-hover);
    color: var(--text-main);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-small:hover { background-color: var(--border); }
  .btn-small.success-btn { background-color: var(--success); color: #fff; border-color: var(--success); }

  #status {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-muted);
  }

  #status.error { color: var(--error); }
  #status.success { color: var(--success); }

  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .column {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background-color: var(--bg-panel);
  }

  .col-folders { width: 220px; flex-shrink: 0; }
  .col-files { width: 260px; flex-shrink: 0; background-color: var(--bg-main); }
  .col-content { flex: 1; background-color: var(--bg-main); border-right: none; display: flex; flex-direction: column;}

  .column-header {
    padding: 10px 15px;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    letter-spacing: 0.5px;
    background-color: var(--bg-panel);
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 40px;
  }

  .list-container {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .list-item {
    padding: 8px 12px;
    margin-bottom: 4px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-main);
    word-break: break-all;
    transition: background-color 0.1s;
  }

  .list-item:hover { background-color: var(--bg-hover); }
  
  .list-item.active {
    background-color: var(--bg-active);
    color: #fff;
  }

  .text-content-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  textarea#textContent {
    flex: 1;
    width: 100%;
    background-color: transparent;
    border: none;
    padding: 20px;
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-main);
    resize: none;
    outline: none;
  }

  .empty-state {
    color: var(--text-muted);
    text-align: center;
    margin-top: 40px;
    font-size: 14px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  .actions {
    display: flex;
    gap: 10px;
  }
</style>
</head>
<body>

<header>
  <a href="#" class="logo">TXT//EDITOR</a>
  
  <div class="input-group">
    <label>User</label>
    <input type="text" id="ghUser" placeholder="Username">
  </div>
  
  <div class="input-group">
    <label>Repo</label>
    <input type="text" id="ghRepo" placeholder="Repository">
  </div>
  
  <div class="input-group">
    <label>Branch</label>
    <input type="text" id="ghBranch" value="main" style="width: 80px;">
  </div>

  <div class="input-group">
    <label>Token (PAT)</label>
    <input type="password" id="ghToken" placeholder="ghp_..." style="width: 120px;" title="Personal Access Token with 'repo' scope">
  </div>

  <button id="loadBtn" class="btn-main" onclick="loadRepository()">Load Files</button>

  <div id="status">Ready</div>
</header>

<div class="workspace">
  <div class="column col-folders">
    <div class="column-header">Folders</div>
    <div class="list-container" id="folderList">
      <div class="empty-state">Loading repository data...</div>
    </div>
  </div>

  <div class="column col-files">
    <div class="column-header">
      <span>Files</span>
      <button class="btn-small" onclick="createNewFile()">+ New</button>
    </div>
    <div class="list-container" id="fileList">
      <div class="empty-state">Select a folder</div>
    </div>
  </div>

  <div class="column col-content">
    <div class="column-header">
      <span id="contentHeader">File Content</span>
      <div class="actions" id="fileActions" style="display: none;">
        <button id="copyBtn" class="btn-small" onclick="copyCode()">Copy</button>
        <button id="saveBtn" class="btn-small" style="background-color: var(--success); color: white; border: none;" onclick="saveFileContent()">Save</button>
      </div>
    </div>
    <div class="text-content-wrapper">
      <textarea id="textContent" placeholder="Select a text file to read or edit..."></textarea>
    </div>
  </div>
</div>

<script>
let allFiles = [];
let foldersData = {}; 
let currentFolder = null;
let currentActiveFile = null;

const elUser = document.getElementById('ghUser');
const elRepo = document.getElementById('ghRepo');
const elBranch = document.getElementById('ghBranch');
const elToken = document.getElementById('ghToken');

const elStatus = document.getElementById('status');
const elFolderList = document.getElementById('folderList');
const elFileList = document.getElementById('fileList');
const elTextContent = document.getElementById('textContent');
const elContentHeader = document.getElementById('contentHeader');
const btnLoad = document.getElementById('loadBtn');
const fileActions = document.getElementById('fileActions');
const btnSave = document.getElementById('saveBtn');

function setStatus(text, type = 'normal') {
  elStatus.textContent = text;
  elStatus.className = type;
}

function loadSettings() {
  const savedUser = localStorage.getItem('txtEditor_user');
  const savedRepo = localStorage.getItem('txtEditor_repo');
  const savedBranch = localStorage.getItem('txtEditor_branch');
  const savedToken = localStorage.getItem('txtEditor_token');

  if (savedUser) elUser.value = savedUser;
  if (savedRepo) elRepo.value = savedRepo;
  if (savedBranch) elBranch.value = savedBranch;
  if (savedToken) elToken.value = savedToken;
}

function saveSettings() {
  localStorage.setItem('txtEditor_user', elUser.value.trim());
  localStorage.setItem('txtEditor_repo', elRepo.value.trim());
  localStorage.setItem('txtEditor_branch', elBranch.value.trim());
  localStorage.setItem('txtEditor_token', elToken.value.trim());
}

// Функции для работы с Base64 и кириллицей (UTF-8)
function utf8_to_b64(str) {
  return window.btoa(unescape(encodeURIComponent(str)));
}

async function loadRepository() {
  const user = elUser.value.trim();
  const repo = elRepo.value.trim();
  const branch = elBranch.value.trim() || 'main';

  if (!user || !repo) {
    setStatus('Error: Username and Repository are required.', 'error');
    return;
  }

  saveSettings();

  btnLoad.disabled = true;
  fileActions.style.display = 'none';
  elTextContent.value = '';
  currentActiveFile = null;
  setStatus('Fetching data...', 'normal');
  
  allFiles = [];
  foldersData = {};
  elFolderList.innerHTML = '';
  elFileList.innerHTML = '<div class="empty-state">Select a folder</div>';
  elContentHeader.textContent = 'File Content';

  try {
    const headers = {};
    if (elToken.value.trim()) {
        headers['Authorization'] = `Bearer ${elToken.value.trim()}`;
    }

    const response = await fetch(`https://api.github.com/repos/${user}/${repo}/git/trees/${branch}?recursive=1`, { headers });
    
    if (!response.ok) {
      throw new Error(`Repository not found or branch is incorrect (HTTP ${response.status})`);
    }

    const data = await response.json();
    const textFiles = data.tree.filter(f => f.type === 'blob' && /\.(txt|md|csv|json|js|html|css)$/i.test(f.path));

    if (textFiles.length === 0) {
      setStatus('No text files found in this repository.', 'error');
      elFolderList.innerHTML = '<div class="empty-state">No folders</div>';
      btnLoad.disabled = false;
      return;
    }

    textFiles.forEach(f => {
      const parts = f.path.split('/');
      const fileName = parts.pop();
      const folderPath = parts.length > 0 ? parts.join('/') : '/ (Root)';
      const rawUrl = `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${f.path}`;

      if (!foldersData[folderPath]) {
        foldersData[folderPath] = [];
      }
      
      foldersData[folderPath].push({
        path: f.path,
        name: fileName,
        url: rawUrl,
        sha: f.sha // SHA обязателен для обновления файлов
      });
    });

    renderFolders();
    setStatus(`Success: Loaded ${textFiles.length} file(s).`, 'success');

  } catch (error) {
    setStatus(error.message, 'error');
  } finally {
    btnLoad.disabled = false;
  }
}

function renderFolders() {
  elFolderList.innerHTML = '';
  const folderNames = Object.keys(foldersData).sort();

  folderNames.forEach(folder => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.textContent = folder;
    
    div.onclick = () => {
      document.querySelectorAll('#folderList .list-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      renderFiles(folder);
    };
    
    elFolderList.appendChild(div);
  });
}

function renderFiles(folderPath) {
  elFileList.innerHTML = '';
  currentFolder = folderPath;
  const files = foldersData[folderPath];

  files.forEach(file => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.textContent = file.name;
    
    div.onclick = () => {
      document.querySelectorAll('#fileList .list-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      loadFileContent(file);
    };
    
    elFileList.appendChild(div);
  });
}

async function loadFileContent(file) {
  currentActiveFile = file;
  elContentHeader.textContent = file.name;
  elTextContent.value = 'Loading...';
  elTextContent.disabled = true;
  fileActions.style.display = 'none';
  
  try {
    const headers = {};
    if (elToken.value.trim()) {
        headers['Authorization'] = `Bearer ${elToken.value.trim()}`;
    }

    const response = await fetch(file.url, { cache: 'no-store', headers }); // Избегаем кэша
    if (!response.ok) throw new Error('Failed to fetch file content');
    
    const text = await response.text();
    elTextContent.value = text;
    elTextContent.disabled = false;
    fileActions.style.display = 'flex';
  } catch (error) {
    elTextContent.value = `Error loading file: ${error.message}`;
  }
}

async function saveFileContent() {
  if (!currentActiveFile) return;

  const token = elToken.value.trim();
  if (!token) {
    alert("Please enter your GitHub Personal Access Token (PAT) in the header to save files.");
    return;
  }

  const user = elUser.value.trim();
  const repo = elRepo.value.trim();
  const branch = elBranch.value.trim() || 'main';
  const newContent = elTextContent.value;
  
  btnSave.textContent = 'Saving...';
  btnSave.disabled = true;

  try {
    const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/${currentActiveFile.path}`;
    
    const body = {
      message: `Update ${currentActiveFile.name} via Web Editor`,
      content: utf8_to_b64(newContent),
      sha: currentActiveFile.sha,
      branch: branch
    };

    const response = await fetch(apiUrl, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!response.ok) {
      const errData = await response.json();
      throw new Error(errData.message || 'Failed to save');
    }

    const data = await response.json();
    
    // Обновляем SHA, чтобы можно было сохранить файл снова без перезагрузки страницы
    currentActiveFile.sha = data.content.sha;
    
    setStatus(`Saved: ${currentActiveFile.name}`, 'success');
    btnSave.textContent = 'Saved!';
    btnSave.classList.add('success-btn');
    
    setTimeout(() => {
      btnSave.textContent = 'Save';
      btnSave.classList.remove('success-btn');
    }, 2000);

  } catch (error) {
    alert(`Error saving file: ${error.message}`);
    setStatus('Error saving file.', 'error');
    btnSave.textContent = 'Save';
  } finally {
    btnSave.disabled = false;
  }
}

async function createNewFile() {
  const token = elToken.value.trim();
  if (!token) {
    alert("Please enter your GitHub Token (PAT) first to create files.");
    return;
  }

  const filePath = prompt("Enter full path for the new file (e.g., folder/newfile.txt or rootfile.md):");
  if (!filePath) return;

  const user = elUser.value.trim();
  const repo = elRepo.value.trim();
  const branch = elBranch.value.trim() || 'main';

  setStatus('Creating file...', 'normal');

  try {
    const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/${filePath}`;
    
    const body = {
      message: `Create ${filePath} via Web Editor`,
      content: utf8_to_b64(""), // Создаем пустой файл
      branch: branch
    };

    const response = await fetch(apiUrl, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!response.ok) {
      const errData = await response.json();
      throw new Error(errData.message || 'Failed to create');
    }

    setStatus(`Created: ${filePath}`, 'success');
    // Перезагружаем дерево репозитория, чтобы новый файл появился в списке
    await loadRepository();

  } catch (error) {
    alert(`Error creating file: ${error.message}`);
    setStatus('Error creating file.', 'error');
  }
}

function copyCode() {
  const textToCopy = elTextContent.value;
  if (!textToCopy) return;

  navigator.clipboard.writeText(textToCopy).then(() => {
    const copyBtn = document.getElementById('copyBtn');
    copyBtn.classList.add('success-btn');
    copyBtn.textContent = 'Copied!';
    
    setTimeout(() => {
      copyBtn.classList.remove('success-btn');
      copyBtn.textContent = 'Copy';
    }, 2000);
  }).catch(err => {
    console.error('Failed to copy text: ', err);
  });
}

window.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  if (elUser.value && elRepo.value) {
    loadRepository();
  }
});
</script>
</body>
</html>
